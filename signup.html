<!DOCTYPE html>
<html lang="ps" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>هیواد ودان| حساب جوړول</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">
  <main class="auth-wrapper">
    <div class="auth-card">
      <a class="auth-logo" href="index.html"></a>
      <h1>نوی حساب جوړ کړئ</h1>
      <p class="auth-subtitle">خپل معلومات ولیکئ او پیل وکړئ.</p>

      <form class="auth-form">
        <label>بشپړ نوم</label>هیواد ودان
        <input type="text" placeholder="خپل نوم ولیکئ" />

        <label>ایمیل</label>
        <input type="email" placeholder="example@email.com" />

        <label>پټنوم</label>
        <input type="password" placeholder="********" />

        <label>پټنوم بیا ولیکئ</label>
        <input type="password" placeholder="********" />

        <button type="submit" class="btn btn-primary full-btn">حساب جوړول</button>
      </form>

      <p class="auth-footer">له مخکې حساب لرئ؟ <a href="login.html">ننوتل</a></p>
    </div>
  </main>
</body>
</html>
